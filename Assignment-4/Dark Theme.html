<!DOCTYPE html>
<html>
<head>
<style>
.day {
    background-color: white;
    color: black;
}

.night {
    background-color: black;
    color: gold;
}

.button_night {
    background-color: darkblue;
    color: white;
}

.button_day{
    background-color: white;
    color: black;
}

html, body {
    margin: 0px;
    height: 100%;
}

#app {
    height: 100%;
    padding: 10px;
}
</style>
</head>
<body>
<div id="app" class="day">
    <p>I am a HashedBit student, ready to become an awesome full stack developer</p>
    <button onclick="swapTheme()" id="swap" class="button_day">Toggle theme</button>
</div>

<script>
function swapTheme() {
    const app = document.getElementById('app');
    const swap = document.getElementById('swap');
    
    if (app.classList.contains('day')) {
        app.classList.remove('day');
        app.classList.add('night');
        swap.classList.remove('button_day');
        swap.classList.add('button_night');
    } else {
        app.classList.remove('night');
        app.classList.add('day');
        swap.classList.remove('button_night');
        swap.classList.add('button_day');
    }
}
</script>
</body>
</html>
