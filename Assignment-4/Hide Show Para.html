<!DOCTYPE html>
<html>
<head>
</head>
<body>
<h1>I am a headline made with HTML</h1>
<br />
<p id="useless-paragraph">Useless paragraph.</p>
<br />
<button onclick="toggleVisibility()">Toggle Button</button>

<script>
// your js code goes here
function toggleVisibility() {
    const p = document.getElementById('useless-paragraph');
    // If not set inline, default display is block/inline.
    // getComputedStyle could be used, but standard assignment logic:
    if (p.style.display === 'none') {
        p.style.display = 'block';
    } else {
        p.style.display = 'none';
    }
}
</script>
</body>
</html>
